ai_usage_summary: |
  Used Claude for architectural guidance and code review.
  No candidate data was fed to any LLM during ranking.
  The ranker itself makes zero API calls and runs fully offline.

methodology_summary: |
  Feature-based ranker with 6 JD-derived scoring components: title match (28%),
  career history (27%), skills coverage with trust multiplier (20%), experience
  (10%), location (8%), and behavioral signals (7%). Skills only score at full
  weight if endorsements > 3 OR duration_months > 6, catching keyword stuffers.
  Career descriptions are scanned for 30+ production-ML phrase patterns. Entire
  consulting-only careers get a 0.20x penalty. Behavioral signals act as a
  multiplicative availability gate (inactive 180d + low response = 0.20x).
  Honeypot detection via 4 rules. Runtime: 36 seconds for 100K candidates,
  CPU only, zero external dependencies.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
